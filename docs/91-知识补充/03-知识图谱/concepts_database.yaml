# ========== 关系类型定义 ==========
relationship_types:
  depends_on:
    label: "依赖于"
    description: "学习此概念需要先掌握的概念"
    strength: [weak, medium, strong]
  
  is_prerequisite_of:
    label: "是前置知识"
    description: "此概念是学习其他概念的基础"
    strength: [weak, medium, strong]
  
  is_related_to:
    label: "相关"
    description: "相关但不依赖的概念"
    strength: [weak, medium, strong]
  
  is_subtype_of:
    label: "是子类型"
    description: "概念层次关系"
    strength: [weak, medium, strong]
  
  is_part_of:
    label: "是组成部分"
    description: "整体-部分关系"
    strength: [weak, medium, strong]
  
  implements:
    label: "实现"
    description: "算法实现对理论的实现"
    strength: [weak, medium, strong]
  
  applies_to:
    label: "应用于"
    description: "理论在领域的应用"
    strength: [weak, medium, strong]
  
  equivalent_to:
    label: "等价于"
    description: "不同表述的等价概念"
    strength: [weak, medium, strong]

