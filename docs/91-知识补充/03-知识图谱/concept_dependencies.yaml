# 推荐学习路径
learning_paths:
  beginner:
    name: "初学者路径"
    description: "从基础理论到算法设计"
    estimated_total_hours: 150
    stages:
      - stage: 1
        name: "数学基础"
        concepts: ["set_theory", "function_theory", "number_theory"]
        estimated_hours: 30
      - stage: 2
        name: "计算模型基础"
        concepts: ["turing_machine", "lambda_calculus", "automata_theory"]
        estimated_hours: 40
      - stage: 3
        name: "逻辑与证明"
        concepts: ["propositional_logic", "first_order_logic", "proof_system", "mathematical_induction"]
        estimated_hours: 35
      - stage: 4
        name: "算法基础"
        concepts: ["time_complexity", "algorithm_design", "data_structure", "sorting_algorithm"]
        estimated_hours: 45
        
  intermediate:
    name: "进阶路径"
    description: "形式化方法与高级算法"
    estimated_total_hours: 200
    stages:
      - stage: 1
        name: "类型与逻辑"
        concepts: ["simple_type_theory", "dependent_type_theory", "type_system", "modal_logic"]
        estimated_hours: 50
      - stage: 2
        name: "复杂度理论"
        concepts: ["complexity_class", "asymptotic_analysis", "computational_complexity_theory"]
        estimated_hours: 40
      - stage: 3
        name: "高级算法"
        concepts: ["dynamic_programming", "graph_algorithm", "randomized_algorithm", "approximation_algorithm"]
        estimated_hours: 60
      - stage: 4
        name: "形式化方法"
        concepts: ["constructive_proof", "formal_verification", "proof_assistant"]
        estimated_hours: 50
        
  advanced:
    name: "专业路径"
    description: "类型理论到形式化验证"
    estimated_total_hours: 250
    stages:
