name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust 代码检查与测试
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust-version: [stable, nightly]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-action@stable
      with:
        toolchain: ${{ matrix.rust-version }}
        components: rustfmt, clippy
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Check formatting
      run: cargo fmt --all -- --check
      working-directory: examples/algorithms
    
    - name: Run Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
      working-directory: examples/algorithms
    
    - name: Build
      run: cargo build --verbose
      working-directory: examples/algorithms
    
    - name: Run tests
      run: cargo test --verbose
      working-directory: examples/algorithms
    
    - name: Run doc tests
      run: cargo test --doc --verbose
      working-directory: examples/algorithms

  # 文档构建检查
  docs-build:
    name: Documentation Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install mdbook
      run: |
        cargo install mdbook --locked || true
        cargo install mdbook-linkcheck --locked || true
    
    - name: Check Markdown links
      run: |
        find docs -name "*.md" -type f | head -20 | while read f; do
          echo "Checking $f"
        done
    
    - name: Spell check
      run: |
        npm install -g cspell
        cspell "docs/**/*.md" --no-progress || true
    
    - name: Build documentation index
      run: |
        echo "# CI Documentation Build" > docs/ci-build.md
        echo "Build time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> docs/ci-build.md
        echo "" >> docs/ci-build.md
        echo "## 文档统计" >> docs/ci-build.md
        echo "- Markdown 文件数: $(find docs -name '*.md' | wc -l)" >> docs/ci-build.md
        echo "- 总字符数: $(find docs -name '*.md' -exec cat {} \; | wc -c)" >> docs/ci-build.md

  # 代码覆盖率
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-action@stable
      with:
        components: llvm-tools-preview
    
    - name: Install cargo-tarpaulin
      run: cargo install cargo-tarpaulin --locked || true
    
    - name: Generate coverage report
      run: |
        cd examples/algorithms
        cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml || true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./examples/algorithms/cobertura.xml
        fail_ci_if_error: false
        verbose: true

  # 质量检查
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check file naming conventions
      run: |
        echo "Checking file naming conventions..."
        invalid_files=$(find . -name "*.md" -o -name "*.rs" | grep -E '[[:space:]]' || true)
        if [ -n "$invalid_files" ]; then
          echo "Warning: Files with spaces found:"
          echo "$invalid_files"
        fi
    
    - name: Check documentation completeness
      run: |
        echo "Checking documentation structure..."
        test -f README.md || echo "Warning: README.md missing"
        test -f docs/README.md || echo "Warning: docs/README.md missing"
        test -f LICENSE || echo "Warning: LICENSE missing"
    
    - name: Validate YAML files
      run: |
        python3 -c "import yaml; yaml.safe_load(open('.github/workflows/ci.yml'))"
        echo "YAML validation passed"

  # 多平台构建测试
  cross-platform:
    name: Cross Platform Build
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-action@stable
    
    - name: Build (Release)
      run: |
        cd examples/algorithms
        cargo build --release --verbose
    
    - name: Test (Release)
      run: |
        cd examples/algorithms
        cargo test --release --verbose
