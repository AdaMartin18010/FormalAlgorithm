name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # =============================================================================
  # Job 1: Lean 4 Build
  # =============================================================================
  lean-build:
    name: Lean 4 Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lean build
        uses: actions/cache@v4
        with:
          path: |
            examples/lean_proofs/.lake/build
            ~/.cache/mathlib
          key: ${{ runner.os }}-lean-${{ hashFiles('examples/lean_proofs/lakefile.toml', 'examples/lean_proofs/lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lean-

      - name: Lake build
        working-directory: examples/lean_proofs
        run: lake build

  # =============================================================================
  # Job 2: Rust Test
  # =============================================================================
  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            examples/algorithms-rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('examples/algorithms-rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Rust project structure
        working-directory: examples/algorithms-rust
        run: |
          set -e
          if [ -f Cargo.toml ]; then
            echo "✅ Found existing Cargo.toml"
            exit 0
          fi

          echo "⚙️ Generating Cargo.toml and module declarations..."
          cat > Cargo.toml << 'EOF'
          [package]
          name = "algorithms-rust"
          version = "0.1.0"
          edition = "2021"

          [dependencies]
          EOF

          # Ensure src/leetcode directory exists
          mkdir -p src/leetcode

          # Generate src/lib.rs with leetcode module
          echo "pub mod leetcode;" > src/lib.rs

          # Generate src/leetcode/mod.rs with all problem modules
          MOD_FILE="src/leetcode/mod.rs"
          : > "$MOD_FILE"
          for rs_file in src/leetcode/*.rs; do
            [ -e "$rs_file" ] || continue
            mod_name=$(basename "$rs_file" .rs)
            echo "pub mod ${mod_name};" >> "$MOD_FILE"
          done

          echo "Generated Cargo.toml:"
          cat Cargo.toml
          echo ""
          echo "Generated src/lib.rs:"
          cat src/lib.rs
          echo ""
          echo "Generated src/leetcode/mod.rs:"
          cat "$MOD_FILE"

      - name: Cargo test
        working-directory: examples/algorithms-rust
        run: cargo test --verbose

  # =============================================================================
  # Job 3: Python Test
  # =============================================================================
  python-test:
    name: Python Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('examples/algorithms-python/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: examples/algorithms-python
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f pyproject.toml ]; then
            pip install -e .
          fi

      - name: Run tests or syntax check
        working-directory: examples/algorithms-python
        run: |
          if [ -d tests ] && [ -n "$(ls -A tests/*.py 2>/dev/null)" ]; then
            echo "🧪 Running pytest..."
            python -m pytest tests/ -v
          else
            echo "⚠️ No test files found, running syntax check with compileall..."
            python -m compileall src/ leetcode/ sorting.py
          fi

  # =============================================================================
  # Job 4: Go Test
  # =============================================================================
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('examples/algorithms-go/go.sum', 'examples/algorithms-go/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Go test
        working-directory: examples/algorithms-go
        run: go test ./... -v

  # =============================================================================
  # Job 5: TypeScript Test
  # =============================================================================
  ts-test:
    name: TypeScript Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/algorithms-ts/package-lock.json

      - name: Install dependencies
        working-directory: examples/algorithms-ts
        run: npm ci

      - name: Run tests
        working-directory: examples/algorithms-ts
        run: npm test

  # =============================================================================
  # Job 6: Markdown Lint
  # =============================================================================
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check YAML frontmatter
        continue-on-error: true
        run: python scripts/ci_check_frontmatter.py

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v1
        with:
          args: --timeout 30 --retry 3 --no-progress docs/
          fail: false

      - name: Documentation stats
        run: |
          echo "📊 Documentation Statistics"
          echo "Total Markdown files: $(find docs -name '*.md' | wc -l)"
          echo "Total characters: $(find docs -name '*.md' -exec cat {} \; | wc -c)"

  # =============================================================================
  # Job 7: Docs Structure Check
  # =============================================================================
  docs-structure-check:
    name: Docs Structure Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check PROJECT_STRUCTURE.md
        run: |
          set -e
          if [ ! -f PROJECT_STRUCTURE.md ]; then
            echo "::error::PROJECT_STRUCTURE.md does not exist"
            exit 1
          fi

          lines=$(wc -l < PROJECT_STRUCTURE.md)
          if [ "$lines" -lt 10 ]; then
            echo "::error::PROJECT_STRUCTURE.md seems too short (${lines} lines), possibly outdated"
            exit 1
          fi

          echo "✅ PROJECT_STRUCTURE.md exists with ${lines} lines"

      - name: Check docs directory has content
        run: |
          md_count=$(find docs -name "*.md" | wc -l)
          if [ "$md_count" -lt 100 ]; then
            echo "::error::docs/ directory seems to have too few markdown files (${md_count})"
            exit 1
          fi
          echo "✅ docs/ contains ${md_count} markdown files"

      - name: Check essential files exist
        run: |
          for file in README.md LICENSE CHANGELOG.md; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "⚠️ $file missing"
            fi
          done
