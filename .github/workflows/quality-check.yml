name: Quality Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 0'  # 每周日运行

jobs:
  # Job 1: Python 代码测试
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run Python tests
        working-directory: examples/algorithms-python
        run: python -m pytest tests/ -v

  # Job 2: Go 代码测试
  go-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Go tests
        working-directory: examples/algorithms-go
        run: go test ./... -v
        continue-on-error: true  # 初期Go测试可能不完善，先非阻断

  # Job 3: 文档质量检查
  doc-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run citation check
        run: python tools/citation_checker.py
        continue-on-error: true

      - name: Run math symbol check
        run: python tools/math_symbol_checker.py
        continue-on-error: true

      - name: Run structure check
        run: python tools/doc_structure_checker.py
        continue-on-error: true

      - name: Generate quality report
        run: python tools/quality_check.py
        continue-on-error: true

      - name: Upload quality reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports
          path: docs/质量报告/

      - name: Comment PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'docs/质量报告/quality-check-report.md';
            
            let report = '';
            try {
              report = fs.readFileSync(reportPath, 'utf8');
            } catch (e) {
              report = '质量检查报告生成失败';
            }
            
            // 截取前3000字符
            const summary = report.substring(0, 3000) + (report.length > 3000 ? '...' : '');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 质量检查结果\n\n${summary}\n\n[查看完整报告](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });
