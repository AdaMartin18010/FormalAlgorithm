name: Content Request
description: 请求补充新内容
title: "[Content] "
labels: ["content-request"]
body:
  - type: input
    id: topic
    attributes:
      label: 请求主题
      description: 希望补充的内容主题
    validations:
      required: true
      
  - type: textarea
    id: motivation
    attributes:
      label: 补充理由
      description: 为什么需要补充这个主题？
    validations:
      required: true
      
  - type: input
    id: reference
    attributes:
      label: 参考资源
      description: 相关的论文、教材或课程
      
  - type: dropdown
    id: priority
    attributes:
      label: 建议优先级
      options:
        - P0（立即补充）
        - P1（1个月内）
        - P2（3个月内）
