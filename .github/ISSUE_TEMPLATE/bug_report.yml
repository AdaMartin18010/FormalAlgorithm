name: Bug Report
description: 报告文档中的错误
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢报告问题！请提供以下信息帮助我们快速定位。
        
  - type: input
    id: document
    attributes:
      label: 问题文档
      description: 请提供文档路径
      placeholder: docs/01-基础理论/01-形式化定义.md
    validations:
      required: true
      
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请详细描述问题
    validations:
      required: true
      
  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      options:
        - 严重（概念性错误）
        - 中等（证明缺陷）
        - 轻微（排版/错别字）
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: 期望的修正
      description: 如果知道如何修正，请说明
