# 质量检查工具配置模板
# 算法规范与模型设计知识体系项目
# 
# 使用说明：
# 1. 将此文件复制到项目根目录，命名为 quality-config.yaml
# 2. 根据项目需求修改配置
# 3. 运行质量检查工具时指定此配置：qualitykit check --config quality-config.yaml

# ==================== 全局设置 ====================
global:
  # 项目基本信息
  project:
    name: "算法规范与模型设计知识体系"
    version: "1.0.0"
    language: "zh-CN"
  
  # 忽略的文件和目录（glob模式）
  ignore:
    # 构建输出
    - "_site/**"
    - "build/**"
    - "dist/**"
    # 依赖目录
    - "node_modules/**"
    - "vendor/**"
    # 临时文件
    - "*.tmp"
    - "*.draft.md"
    - "*.bak"
    # 版本控制
    - ".git/**"
    # 其他
    - "quality-reports/**"
  
  # 并发设置
  concurrency: 4
  
  # 超时设置（秒）
  timeout: 60
  
  # 最大文件大小（MB）
  max_file_size: 10

# ==================== 检查器配置 ====================
checkers:
  
  # -------------------- 链接检查器 --------------------
  link_checker:
    enabled: true
    
    # HTTP请求超时（秒）
    timeout: 30
    
    # 连接超时（秒）
    connect_timeout: 10
    
    # 重试次数
    retries: 3
    
    # 重试延迟（秒）
    retry_delay: 1
    
    # 最大并发请求数
    max_concurrent: 10
    
    # 用户代理字符串
    user_agent: "QualityBot/1.0 (Algorithm Knowledge Base Quality Checker)"
    
    # 请求头
    headers:
      Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
      Accept-Language: "zh-CN,zh;q=0.9,en;q=0.8"
    
    # 忽略的模式（正则表达式）
    ignore_patterns:
      # 邮件链接
      - "^mailto:"
      # 锚点链接
      - "^#"
      # 本地链接
      - "^\\./"
      - "^\\.\\./"
      # 本地主机
      - "localhost"
      - "127\\.0\\.0\\.1"
      - "::1"
    
    # 忽略的URL列表
    ignore_urls: []
    
    # 期望的HTTP状态码
    expected_status_codes:
      - 200
      - 201
      - 204
      - 301
      - 302
      - 307
      - 308
    
    # 检查外部链接
    check_external: true
    
    # 检查内部链接（锚点）
    check_internal: true
    
    # 跟随重定向
    follow_redirects: true
    
    # 最大重定向次数
    max_redirects: 5
  
  # -------------------- 引用格式检查器 --------------------
  citation_checker:
    enabled: true
    
    # 引用格式标准
    style: acm
    
    # 文内引用格式
    citation_format: numeric
    
    # 是否检查DOI格式
    check_doi: true
    
    # 是否检查URL格式
    check_url: true
    
    # 是否要求所有引用都有参考文献条目
    require_bibliography_entry: true
    
    # 是否要求所有参考文献都被引用
    require_citation: true
    
    # 允许的引用类型
    allowed_types:
      - article
      - book
      - inbook
      - inproceedings
      - proceedings
      - thesis
      - report
      - manual
      - online
      - misc
    
    # 各类型必需的字段
    required_fields:
      article:
        - author
        - title
        - journal
        - year
        - volume
      book:
        - author
        - title
        - publisher
        - year
      inproceedings:
        - author
        - title
        - booktitle
        - year
      online:
        - title
        - url
        - access_date
    
    # 参考文献列表标题
    bibliography_title: "参考文献"
    
    # 参考文献排序方式
    sort_by: appearance
  
  # -------------------- 数学符号检查器 --------------------
  math_checker:
    enabled: true
    
    # 检查LaTeX语法
    check_latex_syntax: true
    
    # 支持的数学环境
    math_environments:
      - "$$"
      - "$"
      - "\\["
      - "\\("
      - "```math"
    
    # 检查符号定义
    check_symbol_definition: true
    
    # 符号定义模式
    definition_patterns:
      - "设\\s+\\$[^$]+\\$\\s*为"
      - "定义\\s+\\$[^$]+\\$"
      - "令\\s+\\$[^$]+\\$"
      - "记\\s+\\$[^$]+\\$"
    
    # 检查符号一致性
    check_symbol_consistency: true
    
    # 符号命名规则
    symbol_rules:
      variables:
        pattern: "^[a-z]$"
        style: "italic"
        regex: true
      vectors:
        pattern: "^[uvwxyz]$"
        style: "mathbf"
        regex: true
      matrices:
        pattern: "^[A-Z]$"
        style: "mathbf"
        regex: true
      sets:
        pattern: "^[A-Z]$"
        style: "mathcal"
        regex: true
      constants:
        pattern: "^[eiπ]$"
        style: "mathrm"
        regex: true
    
    # 标准集合符号
    standard_sets:
      "\\mathbb{N}": "自然数集"
      "\\mathbb{Z}": "整数集"
      "\\mathbb{Q}": "有理数集"
      "\\mathbb{R}": "实数集"
      "\\mathbb{C}": "复数集"
      "\\mathbb{P}": "正整数集"
    
    # 检查未闭合的数学环境
    check_unclosed_math: true
  
  # -------------------- 术语一致性检查器 --------------------
  term_checker:
    enabled: true
    
    # 术语表文件路径
    glossary_file: "docs/glossary.md"
    
    # 术语文件格式
    glossary_format: "markdown"
    
    # 检查严格程度
    strictness: normal
    
    # 大小写敏感
    case_sensitive: false
    
    # 检查缩写词
    check_abbreviations: true
    
    # 缩写词必须在首次使用时定义
    require_abbreviation_definition: true
    
    # 缩写词定义模式
    abbreviation_patterns:
      - "（[A-Z]+）"
      - "\\([A-Z]+\\)"
    
    # 允许的术语变体
    allowed_variants:
      - terms: ["时间复杂度", "计算复杂度"]
        preferred: "时间复杂度"
      - terms: ["空间复杂度", "空间需求"]
        preferred: "空间复杂度"
    
    # 禁止的术语
    prohibited_terms:
      "快排": "快速排序"
      "动规": "动态规划"
    
    # 中英文术语对照检查
    check_bilingual_terms: true
    
    # 术语首次使用检查
    check_first_use_definition: true
  
  # -------------------- 文档结构检查器 --------------------
  structure_checker:
    enabled: true
    
    # 文档模板配置
    templates:
      algorithm:
        required_sections:
          - pattern: "^# .+$"
            name: "标题"
            description: "一级标题"
          - pattern: "^## 概述$"
            name: "概述"
            description: "算法概述"
          - pattern: "^## 算法描述$"
            name: "算法描述"
            description: "算法详细描述"
          - pattern: "^## 复杂度分析$"
            name: "复杂度分析"
            description: "时间和空间复杂度分析"
        optional_sections:
          - pattern: "^## 实现$"
            name: "实现"
          - pattern: "^## 示例$"
            name: "示例"
          - pattern: "^## 正确性证明$"
            name: "正确性证明"
          - pattern: "^## 应用$"
            name: "应用"
          - pattern: "^## 参考文献$"
            name: "参考文献"
      
      theory:
        required_sections:
          - pattern: "^# .+$"
            name: "标题"
          - pattern: "^## 定义$"
            name: "定义"
          - pattern: "^## 定理$"
            name: "定理"
          - pattern: "^## 证明$"
            name: "证明"
        optional_sections:
          - pattern: "^## 推论$"
            name: "推论"
          - pattern: "^## 示例$"
            name: "示例"
          - pattern: "^## 参考文献$"
            name: "参考文献"
      
      specification:
        required_sections:
          - pattern: "^# .+$"
            name: "标题"
          - pattern: "^## 范围$"
            name: "范围"
          - pattern: "^## 规范性引用$"
            name: "规范性引用"
          - pattern: "^## 术语和定义$"
            name: "术语和定义"
        optional_sections:
          - pattern: "^## 规范$"
            name: "规范"
          - pattern: "^## 附录"
            name: "附录"
    
    # 最大标题层级
    max_heading_level: 6
    
    # 要求标题层级连续
    require_continuous_headings: true
    
    # 要求标题编号
    require_numbering: false
    
    # 文件命名规范
    file_naming:
      pattern: "^[a-z][a-z0-9_-]*\\.md$"
      description: "小写字母开头，只能包含小写字母、数字、下划线和连字符"
      examples:
        - "sorting.md"
        - "binary_search.md"
        - "graph_theory.md"
    
    # 元数据要求
    required_metadata:
      - key: title
        type: string
        required: true
      - key: version
        type: string
        required: true
      - key: author
        type: string
        required: true
      - key: date
        type: date
        required: true
        format: "YYYY-MM-DD"
      - key: category
        type: string
        required: false
        allowed_values:
          - "algorithm"
          - "theory"
          - "specification"
          - "tutorial"
      - key: tags
        type: array
        required: false

# ==================== 输出设置 ====================
output:
  # 输出格式
  format: markdown
  
  # 输出文件路径
  file: "quality-reports/quality-report-{timestamp}.md"
  
  # 是否包含统计信息
  include_statistics: true
  
  # 是否包含修复建议
  include_suggestions: true
  
  # 是否包含通过的项目
  include_passed: false
  
  # 详细程度
  verbosity: normal
  
  # 是否彩色输出
  color: true

# ==================== 质量门禁 ====================
gate:
  enabled: true
  min_score: 85
  max_errors: 5
  max_warnings: 20
  
  checkers:
    link_checker:
      max_errors: 2
      max_warnings: 5
    citation_checker:
      max_errors: 2
      max_warnings: 5
    math_checker:
      max_errors: 3
      max_warnings: 10
    term_checker:
      max_errors: 5
      max_warnings: 15
    structure_checker:
      max_errors: 2
      max_warnings: 5

# ==================== 报告设置 ====================
report:
  title: "算法规范与模型设计知识体系质量检查报告"
  header: |
    本报告由自动化质量检查工具生成。
  footer: |
    ---
    如有疑问，请联系项目维护团队。
  generate_charts: false
  history_dir: "quality-reports/history"
